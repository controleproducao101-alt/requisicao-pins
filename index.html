<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Requisição de Alimentação</title>

  <style>
    :root{
      --blue:#1f6fa8;
      --blue2:#0b5f98;
      --line:#cfe3f3;
      --bg:#f7fbff;
      --text:#0b2235;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:#ffffff;
      color:var(--text);
      display:flex;
      justify-content:center;
      padding:18px 10px;
    }
    .wrap{width: min(920px, 100%);}

    .card{
      border:2px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      background:#fff;
      box-shadow: 0 2px 10px rgba(0,0,0,.04);
    }
    .card-header{
      padding:18px 16px;
      text-align:center;
      border-bottom:2px solid var(--line);
    }
    .card-header h1{
      margin:0;
      font-size:28px;
      letter-spacing:.5px;
      color:var(--blue);
      font-weight:800;
    }

    .section{padding:16px;}
    .grid-2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
    }
    label{display:block;font-weight:700;margin-bottom:6px}
    input,select,textarea{
      width:100%;
      padding:12px 12px;
      border:2px solid var(--line);
      border-radius:10px;
      font-size:15px;
      outline:none;
      background:#fff;
    }
    input[readonly]{background:#f2f7fc;color:#2b4c65}
    .divider{height:2px;background:var(--line);margin:14px 0}

    .table-wrap{
      width:100%;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
    }
    table{
      width:100%;
      min-width:560px;
      border-collapse:separate;
      border-spacing:0;
      margin-top:8px;
      border:2px solid var(--line);
      border-radius:12px;
      overflow:hidden;
    }
    thead th{
      background: var(--blue);
      color:#fff;
      padding:12px 10px;
      font-size:16px;
      text-align:center;
      border-right:2px solid #ffffff22;
      white-space:nowrap;
    }
    thead th:last-child{border-right:0}
    tbody td{
      padding:10px;
      border-top:2px solid var(--line);
      border-right:2px solid var(--line);
      text-align:center;
      background:#fff;
      vertical-align:middle;
    }
    tbody tr td:first-child{
      text-align:left;
      font-weight:800;
      color:var(--blue2);
      font-size:20px;
      padding-left:14px;
      white-space:nowrap;
    }
    .qty{
      width:78px;
      margin:auto;
      text-align:center;
      padding:8px 6px;
      border:2px solid var(--line);
      border-radius:10px;
      font-size:15px;
    }
    .money{font-weight:800;font-size:18px;white-space:nowrap}

    .total-row{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:18px;
      padding:14px 6px 0;
      font-weight:900;
      color:var(--blue2);
      font-size:22px;
    }
    .total-row span{
      min-width:110px;
      text-align:right;
      color:#111;
      font-size:22px;
    }

    .btn{
      width:100%;
      padding:16px 14px;
      border:none;
      border-radius:12px;
      background: linear-gradient(180deg, #2f86c9, #1b6faa);
      color:#fff;
      font-size:20px;
      font-weight:900;
      cursor:pointer;
      margin-top:16px;
    }
    .btn:disabled{opacity:.6; cursor:not-allowed; filter: grayscale(1);}

    .msg{margin-top:12px;padding:12px;border-radius:10px;display:none;font-weight:700}
    .ok{background:#e7f7ea;border:1px solid #bde5c5; color: #1e4627;}
    .err{background:#fde8e8;border:1px solid #f5b5b5; color: #611a1a;}

    .login{
      margin-bottom:12px;
      padding:16px;
      border:2px solid var(--line);
      border-radius:14px;
      background: var(--bg);
    }
    .login h3{margin:0 0 10px;color:var(--blue2);font-size:18px}
    .small{font-size:12px;color:#5a6b79;margin-top:8px}

    .sent{display:none;padding:16px}
    .sent h2{margin:4px 0 10px;color:var(--blue2);font-size:22px}
    .sent textarea{width:100%; min-height:200px; padding:10px; border-radius:10px; border:2px solid var(--line); font-family: monospace;}
    .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
    .btn2{padding:14px 12px;border-radius:12px;border:none;font-weight:900;font-size:16px;cursor:pointer}
    .btn-dark{background:#1f2d3a;color:#fff}
    .btn-blue{background:var(--blue);color:#fff}

    @media (max-width: 720px){
      .grid-2{grid-template-columns: 1fr;}
      .qty{width:64px;}
      .btn-row{grid-template-columns:1fr;}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="login" id="loginBox">
      <h3>Acesso do Encarregado</h3>
      <div class="grid-2">
        <div>
          <label>Usuário (Matrícula)</label>
          <input id="loginMat" inputmode="numeric" placeholder="Ex: 5042">
        </div>
        <div>
          <label>Senha (PIN)</label>
          <input id="loginPin" type="password" inputmode="numeric" placeholder="••••••">
        </div>
      </div>
      <button class="btn" id="btnEntrar" type="button" style="margin-top:14px">Entrar</button>
      <div id="loginEr" class="msg err"></div>
    </div>

    <div class="card" id="formCard" style="display:none">
      <div class="card-header"><h1>REQUISIÇÃO DE ALIMENTAÇÃO</h1></div>
      <form id="f" class="section">
        <div class="grid-2">
          <div><label>Data *</label><input type="date" name="data" id="data_input" required></div>
          <div><label>Encarregado</label><input type="text" id="funcionario" readonly></div>
          <div>
            <label>Fazenda *</label>
            <select name="fazenda" required>
              <option value="" selected disabled>Selecione...</option>
              <option>SANTA LUCIA ||</option><option>TANGARA</option><option>SANTÍSSIMA TRINDADE</option>
              <option>NOSSA SENHORA APARECIDA</option><option>TANGARÁ II</option><option>ÁGUA AMARELA</option>
              <option>SÃO FRANCISCO</option><option>RONCA</option><option>SÃO SALVADOR I</option>
              <option>SÃO MARTINHO</option><option>SANTA MARIA</option><option>SANTA LUCIA</option>
              <option>NOVO CERRADO</option><option>SÃO SALVADOR II</option><option>ESTIVA</option>
              <option>NOVA ERA</option><option>BREJO GRANDE</option><option>3R</option>
            </select>
          </div>
          <div><label>CR</label><input type="text" id="cr" readonly></div>
        </div>
        <div class="divider"></div>
        <label>Solicitamos do Fornecedor</label>
        <input type="text" id="fornecedor" readonly>
        <div style="margin-top:12px">
          <label>Entregar ao Portador *</label>
          <input type="text" name="portador" required>
        </div>
        <div class="divider"></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Discriminação</th><th>Quant.</th><th>V. Unitário</th><th>Total</th></tr></thead>
            <tbody>
              <tr><td>Café</td><td><input class="qty" type="number" min="0" name="cafe_qtd" value="0" onchange="calc()"></td><td class="money">R$ 5,50</td><td class="money" id="tcafe">R$ 0,00</td></tr>
              <tr><td>Almoço</td><td><input class="qty" type="number" min="0" name="almoco_qtd" value="0" onchange="calc()"></td><td class="money">R$ 19,00</td><td class="money" id="talmoco">R$ 0,00</td></tr>
              <tr><td>Jantar</td><td><input class="qty" type="number" min="0" name="jantar_qtd" value="0" onchange="calc()"></td><td class="money">R$ 19,00</td><td class="money" id="tjantar">R$ 0,00</td></tr>
              <tr><td>Lanche</td><td><input class="qty" type="number" min="0" name="lanche_qtd" value="0" onchange="calc()"></td><td class="money">R$ 5,50</td><td class="money" id="tlanche">R$ 0,00</td></tr>
            </tbody>
          </table>
        </div>
        <div class="total-row"><div>TOTAL R$</div><span id="tgeral">0,00</span></div>
        <div class="divider"></div>
        <label>Observações</label><input type="text" name="obs">
        <button class="btn" id="btnEnviar" type="submit">Enviar Requisição</button>
        <button type="button" class="btn" id="btnSair" style="background:#1f2d3a;margin-top:10px">Sair / Trocar Usuário</button>
        <div id="formEr" class="msg err"></div>
      </form>

      <div class="sent" id="sentBox">
        <h2>Pedido enviado ✅</h2>
        <textarea id="resumoTxt" readonly></textarea>
        <div class="btn-row">
          <button class="btn2 btn-blue" id="btnNovo" type="button">Novo Pedido</button>
          <button class="btn2 btn-dark" id="btnCopiar" type="button">Copiar Pedido</button>
        </div>
        <div id="copyOk" class="msg ok" style="margin-top:10px"></div>
      </div>
    </div>
  </div>

<script>
  // ATENÇÃO: Substitua pelo seu URL do Apps Script
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbw-NKWlIYdxrJEvnyk0pCYqxPlUJOl3CTQSFcSR3E2fsN6g7RkYQvo7lS2a2VFmd1MT/exec";
  const PRICES = { cafe: 5.50, almoco: 19.00, jantar: 19.00, lanche: 5.50 };

  const f = document.getElementById("f");
  const loginBox = document.getElementById("loginBox");
  const formCard = document.getElementById("formCard");
  const sentBox = document.getElementById("sentBox");

  // Funções de Persistência (LocalStorage é mais rápido que chamar o servidor sempre)
  function saveUser(data, pin) {
    localStorage.setItem("user_data", JSON.stringify(data));
    localStorage.setItem("user_pin", pin);
  }
  function getUser() {
    const data = localStorage.getItem("user_data");
    const pin = localStorage.getItem("user_pin");
    return data ? { ...JSON.parse(data), pin } : null;
  }

  function hojeISO(){ return new Date().toISOString().split('T')[0]; }
  function brl(n){ return (Number(n)||0).toFixed(2).replace(".", ","); }

  window.calc = function(){
    const q = { c: f.cafe_qtd.value, a: f.almoco_qtd.value, j: f.jantar_qtd.value, l: f.lanche_qtd.value };
    const t = { 
      c: q.c * PRICES.cafe, a: q.a * PRICES.almoco, j: q.j * PRICES.jantar, l: q.l * PRICES.lanche 
    };
    document.getElementById("tcafe").innerText = "R$ " + brl(t.c);
    document.getElementById("talmoco").innerText = "R$ " + brl(t.a);
    document.getElementById("tjantar").innerText = "R$ " + brl(t.j);
    document.getElementById("tlanche").innerText = "R$ " + brl(t.l);
    document.getElementById("tgeral").innerText = brl(t.c + t.a + t.j + t.l);
  };

  function showForm(user) {
    document.getElementById("funcionario").value = user.funcionario;
    document.getElementById("cr").value = user.cr;
    document.getElementById("fornecedor").value = user.fornecedor;
    document.getElementById("data_input").value = hojeISO();
    loginBox.style.display = "none";
    formCard.style.display = "block";
    f.style.display = "block";
    sentBox.style.display = "none";
    calc();
  }

  // Auto-login instantâneo
  const saved = getUser();
  if(saved) showForm(saved);

  document.getElementById("btnEntrar").onclick = async () => {
    const mat = document.getElementById("loginMat").value.trim();
    const pin = document.getElementById("loginPin").value.trim();
    const btn = document.getElementById("btnEntrar");
    const err = document.getElementById("loginEr");

    if(!mat || !pin) return;
    btn.disabled = true; btn.innerText = "Entrando...";
    err.style.display = "none";

    try {
      const res = await fetch(WEBAPP_URL, {
        method: "POST",
        body: JSON.stringify({ action: "auth", matricula: mat, pin: pin })
      });
      const data = await res.json();
      if(data.ok) {
        saveUser(data, pin);
        showForm({ ...data, pin });
      } else {
        err.innerText = "❌ " + (data.error || "Erro no login");
        err.style.display = "block";
      }
    } catch(e) { alert("Erro de conexão"); }
    finally { btn.disabled = false; btn.innerText = "Entrar"; }
  };

  f.onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById("btnEnviar");
    const user = getUser();
    
    btn.disabled = true; btn.innerText = "Enviando...";

    const payload = Object.fromEntries(new FormData(f).entries());
    payload.action = "pedido";
    payload.matricula = user.matricula;
    payload.pin = user.pin;
    payload.user_agent = navigator.userAgent;

    try {
      const res = await fetch(WEBAPP_URL, { method: "POST", body: JSON.stringify(payload) });
      const data = await res.json();
      if(data.ok) {
        document.getElementById("resumoTxt").value = data.resumo;
        f.style.display = "none";
        sentBox.style.display = "block";
      } else { alert("Erro: " + data.error); }
    } catch(e) { alert("Erro ao enviar"); }
    finally { btn.disabled = false; btn.innerText = "Enviar Requisição"; }
  };

  document.getElementById("btnCopiar").onclick = () => {
    const txt = document.getElementById("resumoTxt");
    txt.select();
    navigator.clipboard.writeText(txt.value);
    const ok = document.getElementById("copyOk");
    ok.innerText = "✅ Copiado!"; ok.style.display = "block";
  };

  document.getElementById("btnNovo").onclick = () => {
    f.reset(); showForm(getUser());
  };

  document.getElementById("btnSair").onclick = () => {
    localStorage.clear();
    location.reload();
  };
</script>
</body>
</html>
